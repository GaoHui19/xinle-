<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫鑫名方 全国大型惠民活动</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chosen Palette: Warm Harmony -->
    <!-- Application Structure Plan: The SPA is designed as an interactive dashboard to clarify and compare complex, repetitive promotional offers. The core structure is a tabbed navigation system, allowing users to select and view one promotion at a time (e.g., "生物电治疗仪," "三清五宝方"). This immediately organizes the chaotic source text into logical, user-selectable categories. When a tab is selected, the main content area dynamically updates to show a description of the bundled product and its specific offer tiers presented in clear, clickable cards. This focused view prevents information overload. A key interaction is an interactive bar chart that updates when a user clicks on an offer card, visually comparing the quantity of products purchased versus the total received. This provides an instant, easy-to-understand visualization of the value of each deal, which is the primary goal for a user evaluating these promotions. This structure transforms a confusing text document into an intuitive comparison tool. -->
    <!-- Visualization & Content Choices: 
        1. Report Info: Multiple, distinct promotional bundles. -> Goal: Organize & Navigate. -> Viz/Method: Tabbed navigation menu (HTML/CSS/JS). -> Interaction: Clicking a tab filters the visible content to show only the selected promotion. -> Justification: This is the most effective way to structure the disorganized source text, allowing users to focus on one offer at a time without being overwhelmed. -> Library/Method: Vanilla JS.
        2. Report Info: Tiered offers (e.g., "Buy 10, Get 1 + a device"). -> Goal: Compare Value. -> Viz/Method: Interactive Vertical Bar Chart (Canvas). -> Interaction: Clicking a specific offer card updates the chart to show a "Purchased" bar vs. a "Total Received" bar. -> Justification: A visual chart makes the value proposition of each tier instantly clear, which is more effective than reading and comparing text descriptions of ratios. -> Library/Method: Chart.js.
        3. Report Info: Product claims and descriptions. -> Goal: Inform. -> Viz/Method: Structured text blocks with styled headings. -> Interaction: Text content is dynamically displayed corresponding to the selected navigation tab. -> Justification: Provides necessary context for each promotion directly alongside the offers, enhancing user understanding. -> Library/Method: Vanilla JS.
        4. Report Info: Limited stock numbers (e.g., "仅限8000台"). -> Goal: Create Urgency. -> Viz/Method: Emphasized text with icons within offer cards. -> Interaction: Static but prominent display. -> Justification: Visually highlights the scarcity mentioned in the source material to support the marketing goals. -> Library/Method: HTML/Tailwind.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body {
            background-color: #FDFBF6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        }
        .tab-active {
            background-color: #A97C50;
            color: #FFFFFF;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .tab-inactive {
            background-color: #FFFFFF;
            color: #A97C50;
        }
        .card-base {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .card-interactive:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 40vh;
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">

        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-[#A97C50] mb-2">[福][福] 给细胞充电 为生命加油 [福][福]</h1>

        </header>

        <nav class="flex flex-wrap justify-center gap-2 md:gap-4 mb-8">
        </nav>

        <main id="content-area" class="bg-white/50 rounded-2xl shadow-inner p-4 md:p-8 min-h-[600px]">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
                <div id="promotion-details" class="lg:col-span-2">
                </div>

                <div class="lg:col-span-3 flex flex-col items-center">
                    <h3 class="text-xl font-bold text-center mb-4 text-[#A97C50]">优惠价值可视化对比</h3>
                    <p class="text-center text-sm text-gray-500 mb-4">点击左侧不同的优惠套餐，在此处查看您获得的实际价值。</p>
                    <div class="chart-container">
                        <canvas id="deal-chart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-center mt-8">
            <p class="text-lg font-semibold">名额有限，欲购从速！</p>
            <p class="text-gray-600">请立即联系您的群主报名订购 [握手]</p>
            <p class="text-sm text-red-600 font-bold mt-4">本次活动结束后【紫鑫名方】将恢复国药标准原价！</p>
        </footer>

    </div>

    <script>
        const promotionData = {
            'device': {
                name: "生物电治疗仪",
                title: "[福] 购【紫鑫名方】送生物电治疗仪",
                description: "购买专利国药【紫鑫名方】，不仅可享多买多送优惠，更有机会免费获赠价值2980元的生物电治疗仪，帮助您更好地调理身体。",
                items: [
                    { label: "订购 6 盒", buy: 6, get_self: 1, get_other: 0, other_name: "生物电治疗仪", text_other: "" },
                    { label: "订购 10 盒", buy: 10, get_self: 1, get_other: 1, other_name: "生物电治疗仪", text_other: "送 1 台价值¥2980治疗仪" },
                    { label: "订购 15 盒", buy: 15, get_self: 3, get_other: 2, other_name: "生物电治疗仪", text_other: "送 2 台价值¥2980治疗仪" }
                ],
                note: "本次生物电治疗仪全国仅限8000台！[礼物][礼物]"
            },
            'sanqing': {
                name: "三清五宝方",
                title: "【紫鑫名方】搭配“三清五宝方”",
                description: "“三清五宝方”清血毒、清药毒、清脂毒，十五分钟排脂毒，二十分钟排药毒，三十分钟排血毒，彻底清除体内的定时炸弹，让您不烂腿，不瞎眼，告别心脑重病危害！",
                items: [
                    { label: "订购 7 盒", buy: 7, get_self: 0, get_other: 5, other_name: "三清五宝方", text_other: "送 5 盒三清五宝方" },
                    { label: "订购 10 盒", buy: 10, get_self: 1, get_other: 10, other_name: "三清五宝方", text_other: "送 10 盒三清五宝方" },
                    { label: "订购 15 盒", buy: 15, get_self: 3, get_other: 20, other_name: "三清五宝方", text_other: "送 20 盒三清五宝方" }
                ],
                note: "名额有限，请联系群主报名！[握手]"
            },
            'luxuejing': {
                name: "鹿血晶",
                title: "【紫鑫名方】搭配“鹿血晶”",
                description: "“鹿血晶”是您加速康复的全球深度双清因子，深度清除人体药毒、血毒，并且能彻底消除增生、结节、息肉、脓肿。",
                items: [
                    { label: "订购 5 盒", buy: 5, get_self: 0, get_other: 3, other_name: "鹿血晶", text_other: "送 3 盒鹿血晶" },
                    { label: "订购 10 盒", buy: 10, get_self: 0, get_other: 10, other_name: "鹿血晶", text_other: "送 10 盒鹿血晶" },
                    { label: "订购 15 盒", buy: 15, get_self: 0, get_other: 20, other_name: "鹿茸晶", text_other: "送 20 盒鹿茸晶" }
                ],
                note: "本次活动仅8000盒，活动只有三天！先到先得！"
            },
            'sanqi': {
                name: "全株三七",
                title: "【紫鑫名方】搭配“云南全株三七”",
                description: "“云南全株三七”可破一切淤血、出血，通一切堵塞。三七根快速打通血管，三七头药效最高，快速打通脑神经，加速中风康复，告别终身瘫痪。",
                items: [
                    { label: "订购 5 盒", buy: 5, get_self: 0, get_other: 5, other_name: "全株三七", text_other: "送 5 盒全株三七" },
                    { label: "订购 10 盒", buy: 10, get_self: 0, get_other: 15, other_name: "全株三七", text_other: "送 15 盒全株三七" },
                    { label: "订购 15 盒", buy: 15, get_self: 0, get_other: 30, other_name: "全株三七", text_other: "送 30 盒全株三七" }
                ],
                note: "全国仅剩不到两千盒，欲购从速！"
            },
            'jiuqiao': {
                name: "九窍心方",
                title: "【紫鑫名方】搭配“九窍心方”",
                description: "两者强强组合，通过打通人体的九窍来加强人体疾病的康复，延缓细胞的衰老，让细胞的存活率增高十几倍，延长生命质量。",
                items: [
                    { label: "申请 8 盒", buy: 8, get_self: 0, get_other: 5, other_name: "九窍心方", text_other: "送 5 盒九窍心方" },
                    { label: "申请 15 盒", buy: 15, get_self: 0, get_other: 15, other_name: "九窍心方", text_other: "送 15 盒九窍心方" },
                    { label: "申请 25 盒", buy: 25, get_self: 0, get_other: 30, other_name: "九窍心方", text_other: "送 30 盒九窍心方" }
                ],
                note: "数量有限，名额紧张，抓紧时间报名！"
            },
            'exclusive': {
                name: "紫鑫名方专享",
                title: "大型慈善公益活动 [喜讯传万家]",
                description: "因紫鑫名方原药材、天然野生鹿茸极其稀奇珍贵，产量降低，库存较少。本次免费送紫鑫名方的机会仅此一次，活动结束后可能出现全国断药情况！",
                items: [
                    { label: "申购 8 盒", buy: 8, get_self: 2, get_other: 0, other_name: "", text_other: "" },
                    { label: "申购 15 盒", buy: 15, get_self: 5, get_other: 0, other_name: "", text_other: "" },
                    { label: "申购 25 盒", buy: 25, get_self: 10, get_other: 0, other_name: "", text_other: "" }
                ],
                note: "即将断货，机会仅此一次！"
            }
        };

        let myChart;

        document.addEventListener('DOMContentLoaded', () => {
            const navContainer = document.querySelector('nav');
            const promotionDetailsContainer = document.getElementById('promotion-details');
            const keys = Object.keys(promotionData);

            keys.forEach((key, index) => {
                const promo = promotionData[key];
                const button = document.createElement('button');
                button.textContent = promo.name;
                button.dataset.key = key;
                button.className = `px-4 py-2 rounded-full font-semibold shadow-md card-base ${index === 0 ? 'tab-active' : 'tab-inactive'}`;
                button.addEventListener('click', () => {
                    document.querySelectorAll('nav button').forEach(btn => {
                        btn.classList.remove('tab-active');
                        btn.classList.add('tab-inactive');
                    });
                    button.classList.add('tab-active');
                    button.classList.remove('tab-inactive');
                    renderPromotion(key);
                });
                navContainer.appendChild(button);
            });

            renderChart();
            renderPromotion(keys[0]);
        });

        function renderPromotion(key) {
            const promo = promotionData[key];
            const container = document.getElementById('promotion-details');
            container.innerHTML = '';

            const title = document.createElement('h2');
            title.className = "text-2xl md:text-3xl font-bold text-gray-800 mb-2";
            title.textContent = promo.title;
            container.appendChild(title);

            const description = document.createElement('p');
            description.className = "text-gray-600 mb-6";
            description.textContent = promo.description;
            container.appendChild(description);

            const itemsContainer = document.createElement('div');
            itemsContainer.className = "space-y-4";
            
            promo.items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-md border-l-4 border-amber-600/50 card-base card-interactive cursor-pointer";
                card.addEventListener('click', () => {
                    const totalSelf = item.buy + item.get_self;
                    updateChart(item.buy, totalSelf, item.get_other, item.other_name);
                });

                let contentHtml = `<div class="flex justify-between items-center">
                    <div class="font-bold text-lg text-amber-800">${item.label}</div>
                    <div class="text-sm font-semibold text-green-700">`;

                if (item.get_self > 0) {
                    contentHtml += `送 ${item.get_self} 盒《紫鑫名方》`;
                }
                
                contentHtml += `</div></div>`;

                if (item.text_other) {
                    contentHtml += `<div class="text-right text-sm font-semibold text-blue-700 mt-1">+ ${item.text_other}</div>`;
                }
                
                card.innerHTML = contentHtml;
                itemsContainer.appendChild(card);
            });
            container.appendChild(itemsContainer);

            if (promo.note) {
                const note = document.createElement('div');
                note.className = "mt-6 p-3 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-r-lg";
                note.textContent = promo.note;
                container.appendChild(note);
            }
            
            const firstItem = promo.items[0];
            updateChart(firstItem.buy, firstItem.buy + firstItem.get_self, firstItem.get_other, firstItem.other_name);
        }

        function renderChart() {
            const ctx = document.getElementById('deal-chart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    scales: {
                        x: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '获得产品数量 (盒/台)'
                            }
                        },
                        y: {
                           grid: {
                                display: false
                           }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: '购买 vs. 获赠'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.x !== null) {
                                        label += context.parsed.x + (context.dataset.label.includes('治疗仪') ? ' 台' : ' 盒');
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function updateChart(buy, totalSelf, getOther, otherName) {
            const labels = ['《紫鑫名方》'];
            const purchasedData = [buy];
            const bonusData = [totalSelf - buy];
            
            if (getOther > 0) {
                labels.push(otherName);
                purchasedData.push(0);
                bonusData.push(getOther);
            }

            myChart.data.labels = labels;
            myChart.data.datasets = [
                {
                    label: '您购买的数量',
                    data: purchasedData,
                    backgroundColor: '#A97C50',
                    borderColor: '#8D6E63',
                    borderWidth: 1
                },
                {
                    label: '您免费获赠的数量',
                    data: bonusData,
                    backgroundColor: '#4ade80',
                    borderColor: '#22c55e',
                    borderWidth: 1
                }
            ];
            myChart.options.scales.y.type = 'category';
            myChart.update();
        }

    </script>
</body>
</html>
